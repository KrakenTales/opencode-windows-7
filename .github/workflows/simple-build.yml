name: Build opencode CLI (Windows)
# on: [push]       # раскомментировать для автосборки на каждый push
on: workflow_dispatch

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build Windows CLI
        working-directory: packages/opencode
        env:
          OPENCODE_CHANNEL: latest
        run: bun script/build.ts --single --skip-install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-windows
          path: packages/opencode/dist/opencode-windows-x64/bin/opencode.exe
