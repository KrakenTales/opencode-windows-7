name: Sync with upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream version (e.g. 1.18.0). Empty = auto"
        required: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.check.outputs.update_needed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Get upstream version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(gh release list --repo anomalyco/opencode --limit 100 --json tagName --jq '[.[].tagName | select(test("^v[0-9]+\.[0-9]+\.[0-9]+$"))] | first')
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if update needed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "current=$CURRENT target=$VERSION"
          if [ "$CURRENT" != "$VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Save custom files
        if: steps.check.outputs.update_needed
        run: |
          mkdir -p /tmp/custom
          cp .github/workflows/*.yml /tmp/custom/

      - name: Download and extract upstream source
        if: steps.check.outputs.update_needed
        run: |
          curl -sL "https://github.com/anomalyco/opencode/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz" \
            | tar xz --strip-components=1

      - name: Restore custom files
        if: steps.check.outputs.update_needed
        run: |
          rm -f .github/workflows/*.yml
          cp /tmp/custom/*.yml .github/workflows/

      - name: Patch package.json (bun@1.3.13)
        if: steps.check.outputs.update_needed
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf8'));
            pkg.packageManager = 'bun@1.3.13';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Patch README.md (add Win7 banner)
        if: steps.check.outputs.update_needed
        run: |
          if ! grep -q "fork of OpenCode just for Windows 7" README.md 2>/dev/null; then
            (
              echo '> **This is the fork of OpenCode just for Windows 7.** Use [VxKex-NEXT](https://github.com/YuZhouRen86/VxKex-NEXT) to run it.'
              echo ''
              echo '---'
              echo ''
              cat README.md
            ) > /tmp/readme_patched
            mv /tmp/readme_patched README.md
          fi

      - name: Commit and push
        if: steps.check.outputs.update_needed
        run: |
          git config user.name 'opencode-sync[bot]'
          git config user.email 'opencode-sync[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: sync with upstream ${{ steps.version.outputs.tag }}"
          git pull --rebase origin main
          git push

  build:
    needs: sync
    if: needs.sync.outputs.update_needed == 'true'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build Windows CLI (test build)
        working-directory: packages/opencode
        env:
          OPENCODE_CHANNEL: latest
        run: bun script/build.ts --single --skip-install

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-windows-test-${{ needs.sync.outputs.version }}
          path: packages/opencode/dist/opencode-windows-x64/bin/opencode.exe
